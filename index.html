<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AssinaPDFjá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }

        /* Estilo da Barra Superior */
        header { z-index: 50; position: sticky; top: 0; }

/* Container do PDF Corrigido */
.pdf-container {
    position: relative;
    overflow: auto;
    /* MUDANÇA: Fundo branco para visual profissional */
    background: #ffffff; 
    border-radius: 8px;
    min-height: 400px;
    padding: 10px; /* Pequeno espaçamento para não colar na borda */
}

#pdf-wrapper {
    position: relative; /* Essencial para as assinaturas seguirem a folha */
    display: inline-block;
}

.pdf-area {
    width: 100%;
    background: #ffffff; /* Fundo branco conforme solicitado */
    display: flex;
    justify-content: center;
    padding: 20px 0;
    overflow-y: auto; /* Permite rolagem */
}

#pdf-canvas { 
    display: block; 
    background: white; 
    box-shadow: 0 0 20px rgba(0,0,0,0.05); /* Sombra sutil para borda */
}

        /* Assinatura Flutuante */
        .draggable-sig {
            position: absolute;
            border: 2px dashed var(--accent);
            cursor: move;
            touch-action: none;
            z-index: 10;
            background: rgba(59, 130, 246, 0.05);
        }

        .sig-controls {
            position: absolute;
            top: -45px;
            left: 0;
            display: flex;
            gap: 4px;
            background: white;
            padding: 4px;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .sig-controls button { font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 4px; background: #f1f5f9; color: var(--primary); }

        /* Modal de Assinatura */
#sig-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: white;
    z-index: 100;
    flex-direction: column;
    height: 100dvh; /* Altura dinâmica para mobile */
    width: 100vw;
    overflow: hidden; /* Impede qualquer rolagem */
}

#pad-container {
    flex: 1;
    display: none; /* Começa escondido */
    flex-direction: column;
    height: 100%;
}


#signature-pad {
    flex: 1; /* Ocupa todo o espaço entre o topo e os botões */
    width: 100%;
    touch-action: none;
    background: #fafafa;
}

.modal-footer {
    display: flex;
    gap: 10px;
    padding: 15px;
    background: white;
    border-top: 1px solid #eee;
    padding-bottom: env(safe-area-inset-bottom); /* Suporte para iPhone/Android modernos */
}

    </style>
</head>
<body>

<header class="bg-[#0f172a] p-4 text-white flex flex-col gap-3 shadow-md sticky top-0 z-50">
    <div class="flex justify-between items-center">
        <span class="text-xl font-bold tracking-tight">AssinaPDF<span class="text-blue-400">já</span></span>
        <button id="save-btn" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm font-bold transition disabled:opacity-30" disabled>Salvar e Baixar</button>
    </div>

    <div class="flex justify-between items-center bg-[#1e293b] p-2 rounded-lg">
        <div class="flex items-center gap-3">
            <span id="page-info" class="text-xs font-mono">Documento carregado</span>
        </div>
        <div class="flex gap-4 border-l border-slate-700 pl-4">
            <span class="text-xs self-center text-slate-400">Zoom:</span>
            <button onclick="changeZoom(-0.2)" class="font-bold text-lg">-</button>
            <button onclick="changeZoom(0.2)" class="font-bold text-lg">+</button>
        </div>
    </div>
</header>

    <main class="p-4 max-w-4xl mx-auto space-y-6">

        <section class="space-y-3">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-slate-700">1. Selecione o Documento</h2>
                <div class="flex gap-2">
                    <button onclick="changeZoom(-0.2)" class="bg-[#0f172a] text-white w-8 h-8 rounded-full shadow font-bold">-</button>
                    <button onclick="changeZoom(0.2)" class="bg-[#0f172a] text-white w-8 h-8 rounded-full shadow font-bold">+</button>
                </div>
            </div>

            <input type="file" id="pdf-input" accept="application/pdf" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 uppercase tracking-widest"/>

            <div class="pdf-area">
                <div id="pdf-wrapper">
                    <canvas id="pdf-canvas"></canvas>
                </div>
            </div>
        </section>

        <section class="text-center py-4">
            <h2 class="font-bold text-slate-700 mb-4">2. Criar Assinatura</h2>
            <button onclick="openSigFlow()" class="w-full bg-[#0f172a] text-white py-5 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                Assinar agora
            </button>
        </section>
    </main>

    <div id="sig-modal">
        <div id="orientation-msg" class="flex-1 flex flex-col items-center justify-center p-10 text-center space-y-4">
            <div class="text-5xl animate-bounce">🔄</div>
            <h2 class="text-2xl font-bold">Vire o celular</h2>
            <p class="text-slate-500">Para uma assinatura melhor, use o modo paisagem (deitado).</p>
            <button onclick="showPad()" class="bg-blue-600 text-white px-10 py-4 rounded-full font-bold shadow-lg">Estou pronto</button>
        </div>

        <div id="pad-container" class="hidden">
            <canvas id="signature-pad"></canvas>
            <div class="modal-footer">
                <button onclick="closeSigModal()" class="flex-1 py-3 bg-white text-slate-600 rounded-xl font-bold border border-slate-200">Cancelar</button>
                <button onclick="sigPad.clear()" class="flex-1 py-3 bg-white text-red-500 rounded-xl font-bold border border-slate-200">Limpar</button>
                <button onclick="confirmSignature()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-md">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const { PDFDocument } = PDFLib;

        let pdfBytes, pdfPage, sigPad, currentScale = 1.0;
        let activeSignature = null;
let pdfDoc = null; // Objeto do PDF carregado
let currentPage = 1;
let totalPages = 0;

// --- Alteração na carga do PDF para Rolagem Vertical ---
document.getElementById('pdf-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    pdfBytes = await file.arrayBuffer();

    const loadingTask = pdfjsLib.getDocument({ data: pdfBytes });
    pdfDoc = await loadingTask.promise;
    totalPages = pdfDoc.numPages;
    
    renderAllPages(); // Chama a renderização de todas as páginas
});


async function loadPage(num) {
    pdfPage = await pdfDoc.getPage(num);
    document.getElementById('page-info').textContent = `Pág: ${num} / ${totalPages}`;
    renderPDF();
}

// --- Função para trocar de página ---
function changePage(delta) {
    const newPage = currentPage + delta;
    if (newPage >= 1 && newPage <= totalPages) {
        // Antes de trocar, removemos as assinaturas da tela anterior 
        // ou você pode optar por mantê-las se o usuário quiser assinar várias páginas.
        // Se quiser limpar ao trocar de página, use: 
        // document.querySelectorAll('.draggable-sig').forEach(el => el.remove());
        
        currentPage = newPage;
        loadPage(currentPage);
    }
}

async function renderAllPages() {
    const wrapper = document.getElementById('pdf-wrapper');
    wrapper.innerHTML = ''; // Limpa o wrapper
    document.getElementById('save-btn').disabled = true;

    for (let num = 1; num <= totalPages; num++) {
        const page = await pdfDoc.getPage(num);
        const viewport = page.getViewport({ scale: currentScale });

        // Cria um container para cada página (ajuda no posicionamento das assinaturas)
        const pageContainer = document.createElement('div');
        pageContainer.className = 'relative mb-4 bg-white shadow-lg page-block';
        pageContainer.dataset.pageNumber = num; // Guarda o número da página
        pageContainer.style.width = `${viewport.width}px`;
        pageContainer.style.height = `${viewport.height}px`;

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        canvas.className = 'block';

        pageContainer.appendChild(canvas);
        wrapper.appendChild(pageContainer);

        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
    }
    
    document.getElementById('save-btn').disabled = false;
    document.getElementById('page-info').textContent = `${totalPages} páginas carregadas`;
}   

     async function renderPDF() {
            if (!pdfPage) return;
            const canvas = document.getElementById('pdf-canvas');
            const ctx = canvas.getContext('2d');
            const viewport = pdfPage.getViewport({ scale: currentScale });
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await pdfPage.render({ canvasContext: ctx, viewport: viewport }).promise;
            document.getElementById('save-btn').disabled = false;
        }

function changeZoom(delta) {
    currentScale = Math.min(Math.max(currentScale + delta, 0.5), 3);
    renderAllPages();
}

// Ajuste na função de criar assinatura para anexar à página visível ou ao wrapper
function createDraggableSignature(url, x, y) {
    const div = document.createElement('div');
    div.className = 'draggable-sig';
    div.style.width = '150px';
    div.style.height = '75px';
    
    // Calcula a posição baseada no scroll atual para aparecer no centro da tela
    const scrollY = document.querySelector('.pdf-area').scrollTop;
    div.style.left = '50px'; 
    div.style.top = (scrollY + 100) + 'px';
    
    div.style.position = 'absolute';

    const img = document.createElement('img');
    img.src = url;
    img.style.width = '100%';
    img.style.height = '100%';
    img.style.pointerEvents = 'none';

    const controls = document.createElement('div');
    controls.className = 'sig-controls';
    controls.innerHTML = `
        <button onclick="rotateSig(this)">Girar</button>
        <button onclick="this.parentElement.parentElement.remove()" class="text-red-500">X</button>
    `;

    div.appendChild(controls);
    div.appendChild(img);

    document.getElementById('pdf-wrapper').appendChild(div);
    makeDraggable(div);
}

// --- Ajuste no Salvar (Mapeamento de Páginas) ---
document.getElementById('save-btn').addEventListener('click', async () => {
    const signatures = document.querySelectorAll('.draggable-sig');
    if (signatures.length === 0) return alert("Adicione ao menos uma assinatura.");

    const pdfDocLib = await PDFDocument.load(pdfBytes);
    const pages = pdfDocLib.getPages();

    for (const sig of signatures) {
        const imgData = sig.querySelector('img').src;
        const sigImg = await pdfDocLib.embedPng(imgData);
        
        const sigRect = sig.getBoundingClientRect();
        
        // Descobre em qual página o elemento está sobreposto
        const pageBlocks = document.querySelectorAll('.page-block');
        let targetPageIdx = 0;
        let relativeY = 0;

        for (let i = 0; i < pageBlocks.length; i++) {
            const blockRect = pageBlocks[i].getBoundingClientRect();
            // Se o topo da assinatura está dentro dos limites verticais deste bloco de página
            if (sigRect.top >= blockRect.top && sigRect.top <= blockRect.bottom) {
                targetPageIdx = i;
                const pageLib = pages[targetPageIdx];
                const { width, height } = pageLib.getSize();
                const ratio = width / blockRect.width;

                const x = (sigRect.left - blockRect.left) * ratio;
                // No PDFLib o Y=0 é no rodapé, invertemos a lógica:
                const y = height - ((sigRect.top - blockRect.top) * ratio) - (sig.offsetHeight * ratio);

                pageLib.drawImage(sigImg, {
                    x: x,
                    y: y,
                    width: sig.offsetWidth * ratio,
                    height: sig.offsetHeight * ratio,
                });
                break;
            }
        }
    }

    const saved = await pdfDocLib.save();
    const link = document.createElement('a');
    link.href = URL.createObjectURL(new Blob([saved], { type: "application/pdf" }));
    link.download = "assinado.pdf";
    link.click();
});

        function openSigFlow() {
            modal.style.display = 'flex';
            document.getElementById('orientation-msg').classList.remove('hidden');
            document.getElementById('pad-container').classList.add('hidden');
        }

function showPad() {
    // 1. Esconde a mensagem de orientação completamente
    document.getElementById('orientation-msg').style.display = 'none';
    
    // 2. Mostra o container do pad como flex
    const container = document.getElementById('pad-container');
    container.style.display = 'flex';
    container.classList.remove('hidden');

    // 3. Ajusta o tamanho do canvas ao novo espaço disponível
    setTimeout(() => {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        // Pega a largura e altura exatas que o CSS flex:1 reservou
        sigCanvas.width = sigCanvas.offsetWidth * ratio;
        sigCanvas.height = sigCanvas.offsetHeight * ratio;
        sigCanvas.getContext("2d").scale(ratio, ratio);
        sigPad.clear();
    }, 150); // Delay leve para o layout assentar
}

        function closeSigModal() { modal.style.display = 'none'; }

        function confirmSignature() {
            if (sigPad.isEmpty()) return alert("Desenhe sua assinatura!");
            const dataUrl = sigPad.toDataURL();
            const canvas = document.getElementById('pdf-canvas');
            
            // Centraliza no canvas visível
            createDraggableSignature(dataUrl, (canvas.width / 2) - 75, (canvas.height / 2) - 37);
            closeSigModal();
        }

        // --- Assinatura Manipulável ---

function createDraggableSignature(url, x, y) {
    const div = document.createElement('div');
    div.className = 'draggable-sig';
    div.style.width = '150px';
    div.style.height = '75px';
    div.style.left = x + 'px';
    div.style.top = y + 'px';
    div.style.position = 'absolute'; // Garante que ela se mova com o wrapper

    const img = document.createElement('img');
    img.src = url;
    img.style.width = '100%';
    img.style.height = '100%';
    img.style.pointerEvents = 'none';

    const controls = document.createElement('div');
    controls.className = 'sig-controls';
    controls.innerHTML = `
        <button onclick="rotateSig(this)">Girar</button>
        <button onclick="cloneSig(this)">Clonar</button>
        <button onclick="this.parentElement.parentElement.remove()" class="text-red-500">X</button>
    `;

    div.appendChild(controls);
    div.appendChild(img);
    
    // ANEXAR AO WRAPPER: Isso faz a assinatura seguir a rolagem da folha
    document.getElementById('pdf-wrapper').appendChild(div);
    
    makeDraggable(div);
}


        function makeDraggable(el) {
            let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
            const start = (e) => {
                p3 = e.clientX || e.touches[0].clientX;
                p4 = e.clientY || e.touches[0].clientY;
                document.onmouseup = document.ontouchend = end;
                document.onmousemove = document.ontouchmove = move;
            };
            const move = (e) => {
                const cx = e.clientX || e.touches[0].clientX;
                const cy = e.clientY || e.touches[0].clientY;
                p1 = p3 - cx; p2 = p4 - cy; p3 = cx; p4 = cy;
                el.style.top = (el.offsetTop - p2) + "px";
                el.style.left = (el.offsetLeft - p1) + "px";
            };
            const end = () => { document.onmouseup = document.onmousemove = document.ontouchend = document.ontouchmove = null; };
            el.onmousedown = el.ontouchstart = start;
        }

        function rotateSig(btn) {
            const el = btn.parentElement.parentElement;
            const curr = el.style.transform.replace(/[^\d.]/g, '') || 0;
            el.style.transform = `rotate(${(parseInt(curr) + 90) % 360}deg)`;
        }

function cloneSig(btn) {
    const el = btn.parentElement.parentElement;
    const imgData = el.querySelector('img').src;
    
    // Pega a posição exata da assinatura atual
    const currentTop = el.style.top;
    const currentLeft = el.style.left;

    // Cria a nova assinatura na mesma posição
    // Se o usuário mudar de página, ela já estará posicionada no local correto do wrapper
    createDraggableSignature(imgData, parseInt(currentLeft), parseInt(currentTop));
    
    alert("Assinatura clonada na mesma posição!");
}


        // --- Salvar ---
        document.getElementById('save-btn').addEventListener('click', async () => {
            const signatures = document.querySelectorAll('.draggable-sig');
            if (signatures.length === 0) return alert("Adicione ao menos uma assinatura.");

            const pdfDoc = await PDFDocument.load(pdfBytes);
            const page = pdfDoc.getPages()[0];
            const { width, height } = page.getSize();
            const canvas = document.getElementById('pdf-canvas');
            const ratio = width / canvas.width;

            for (const sig of signatures) {
                const imgData = sig.querySelector('img').src;
                const sigImg = await pdfDoc.embedPng(imgData);
                const rect = sig.getBoundingClientRect();
                const crect = canvas.getBoundingClientRect();
                
                page.drawImage(sigImg, {
                    x: (rect.left - crect.left) * ratio,
                    y: height - ((rect.top - crect.top) * ratio) - (sig.offsetHeight * ratio),
                    width: sig.offsetWidth * ratio,
                    height: sig.offsetHeight * ratio,
                });
            }

            const saved = await pdfDoc.save();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([saved], { type: "application/pdf" }));
            link.download = "assinado.pdf";
            link.click();
        });
    </script>
</body>
</html>
