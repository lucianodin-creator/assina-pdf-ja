<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assinador PDF Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Previne o scroll durante a assinatura */
        #signature-pad {
            touch-action: none;
            cursor: crosshair;
        }

        /* Estilização da área de preview do PDF */
        #pdf-canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            cursor: cell;
        }

        .bg-navy { background-color: #1e293b; }
        .text-navy { color: #1e293b; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-navy p-6 text-white text-center shadow-lg">
        <h1 class="text-xl font-bold tracking-tight">Assinador de PDF Mobile</h1>
        <p class="text-sm opacity-80">Rápido, seguro e local</p>
    </header>

    <main class="max-w-md mx-auto px-4 mt-8 space-y-6">

        <section id="upload-section" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center">
            <div class="mb-4">
                <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold uppercase">Passo 1</span>
            </div>
            <h2 class="text-lg font-semibold mb-4">Selecione o documento</h2>
            <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-300 rounded-2xl cursor-pointer hover:bg-slate-50 transition">
                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                    <svg class="w-8 h-8 mb-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p class="text-sm text-slate-500" id="file-name">Toque para subir o PDF</p>
                </div>
                <input type="file" id="pdf-input" accept="application/pdf" class="hidden" />
            </label>
        </section>

        <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <div class="mb-4 text-center">
                <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold uppercase">Passo 2</span>
            </div>
            <h2 class="text-lg font-semibold mb-4 text-center">Desenhe sua assinatura</h2>
            <div class="border border-slate-200 rounded-xl bg-slate-50 overflow-hidden">
                <canvas id="signature-pad" class="w-full h-48"></canvas>
            </div>
            <div class="mt-3 flex justify-end">
                <button id="clear-btn" class="text-sm font-semibold text-red-500 px-4 py-2 hover:bg-red-50 rounded-lg transition">Limpar Assinatura</button>
            </div>
        </section>

        <section id="preview-section" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center">
                <div class="mb-4">
                    <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold uppercase">Passo 3</span>
                </div>
                <h2 class="text-lg font-semibold mb-2">Toque onde deseja assinar</h2>
                <p class="text-xs text-slate-500 mb-4">Clique no documento abaixo para posicionar a assinatura</p>
                
                <div class="flex justify-center overflow-auto rounded-lg">
                    <canvas id="pdf-canvas"></canvas>
                </div>

                <button id="download-btn" class="w-full mt-6 bg-navy text-white font-bold py-4 rounded-2xl shadow-lg hover:opacity-90 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    Baixar PDF Assinado
                </button>
            </div>
        </section>

    </main>

    <script>
        const { PDFDocument } = PDFLib;
        let pdfDoc = null;
        let pdfBytes = null;
        let signaturePos = null;

        // Configuração do Canvas de Assinatura
        const canvas = document.getElementById('signature-pad');
        const signaturePad = new SignaturePad(canvas, {
            backgroundColor: 'rgba(255, 255, 255, 0)'
        });

        // Ajusta o tamanho do canvas de assinatura para o container
        function resizeSignatureCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }
        window.addEventListener("resize", resizeSignatureCanvas);
        resizeSignatureCanvas();

        document.getElementById('clear-btn').addEventListener('click', () => signaturePad.clear());

        // Lógica de Upload e Renderização básica do PDF
        document.getElementById('pdf-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('file-name').textContent = file.name;
            pdfBytes = await file.arrayBuffer();
            
            // Carrega o documento para obter dimensões
            const tempDoc = await PDFDocument.load(pdfBytes);
            const page = tempDoc.getPages()[0];
            const { width, height } = page.getSize();

            // Configura o canvas de preview
            const previewCanvas = document.getElementById('pdf-canvas');
            previewCanvas.width = width;
            previewCanvas.height = height;
            
            const ctx = previewCanvas.getContext('2d');
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = "#64748b";
            ctx.font = "20px Inter";
            ctx.textAlign = "center";
            ctx.fillText("Prévia da Página 1: Toque para marcar", width/2, height/2);

            document.getElementById('preview-section').classList.remove('hidden');
            previewCanvas.scrollIntoView({ behavior: 'smooth' });
        });

        // Captura o clique na prévia do PDF
        document.getElementById('pdf-canvas').addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Converte coordenadas do clique para coordenadas do PDF
            const scaleX = this.width / rect.width;
            const scaleY = this.height / rect.height;

            signaturePos = {
                x: x * scaleX,
                y: this.height - (y * scaleY) // PDFLib usa origem no canto inferior esquerdo
            };

            // Feedback visual no canvas de preview
            const ctx = this.getContext('2d');
            ctx.clearRect(0, 0, this.width, this.height);
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, this.width, this.height);
            ctx.fillStyle = "#64748b";
            ctx.fillText("Local marcado! Clique em baixar.", this.width/2, this.height/2);
            
            // Desenha um retângulo azul onde a assinatura vai ficar
            ctx.strokeStyle = "#3b82f6";
            ctx.lineWidth = 2;
            ctx.strokeRect(x * scaleX - 75, y * scaleY - 37, 150, 75);

            document.getElementById('download-btn').disabled = false;
        });

        // Geração do PDF Final
        document.getElementById('download-btn').addEventListener('click', async () => {
            if (signaturePad.isEmpty()) {
                alert("Por favor, desenhe sua assinatura primeiro.");
                return;
            }

            try {
                const finalDoc = await PDFDocument.load(pdfBytes);
                const signatureImage = await finalDoc.embedPng(signaturePad.toDataURL());
                const pages = finalDoc.getPages();
                const firstPage = pages[0];

                // Insere a assinatura (centralizada no ponto do clique)
                firstPage.drawImage(signatureImage, {
                    x: signaturePos.x - 75,
                    y: signaturePos.y - 37,
                    width: 150,
                    height: 75,
                });

                const pdfResultBytes = await finalDoc.save();
                
                // Trigger do Download
                const blob = new Blob([pdfResultBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "documento_assinado.pdf";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (err) {
                console.error(err);
                alert("Erro ao gerar o PDF. Verifique o arquivo enviado.");
            }
        });
    </script>
</body>
</html>
