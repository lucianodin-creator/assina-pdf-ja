<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AssinaPDFjá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }

        /* Estilo da Barra Superior */
        header { z-index: 50; position: sticky; top: 0; }

/* Container do PDF Corrigido */
.pdf-container {
    position: relative;
    overflow: auto;
    /* MUDANÇA: Fundo branco para visual profissional */
    background: #ffffff; 
    border-radius: 8px;
    min-height: 400px;
    padding: 10px; /* Pequeno espaçamento para não colar na borda */
}

#pdf-wrapper {
    position: relative; /* Essencial para as assinaturas seguirem a folha */
    display: inline-block;
}

.pdf-area {
    width: 100%;
    background: #ffffff; /* Fundo branco conforme solicitado */
    display: flex;
    justify-content: center;
    padding: 20px 0;
    overflow-y: auto; /* Permite rolagem */
}

#pdf-canvas { 
    display: block; 
    background: white; 
    box-shadow: 0 0 20px rgba(0,0,0,0.05); /* Sombra sutil para borda */
}

        /* Assinatura Flutuante */
        .draggable-sig {
            position: absolute;
            border: 2px dashed var(--accent);
            cursor: move;
            touch-action: none;
            z-index: 10;
            background: rgba(59, 130, 246, 0.05);
        }

        .sig-controls {
            position: absolute;
            top: -45px;
            left: 0;
            display: flex;
            gap: 4px;
            background: white;
            padding: 4px;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .sig-controls button { font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 4px; background: #f1f5f9; color: var(--primary); }

        /* Modal de Assinatura */
#sig-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: white;
    z-index: 100;
    flex-direction: column;
    height: 100dvh; /* Altura dinâmica para mobile */
    width: 100vw;
    overflow: hidden; /* Impede qualquer rolagem */
}

#pad-container {
    flex: 1;
    display: none; /* Começa escondido */
    flex-direction: column;
    height: 100%;
}


#signature-pad {
    flex: 1; /* Ocupa todo o espaço entre o topo e os botões */
    width: 100%;
    touch-action: none;
    background: #fafafa;
}

.modal-footer {
    display: flex;
    gap: 10px;
    padding: 15px;
    background: white;
    border-top: 1px solid #eee;
    padding-bottom: env(safe-area-inset-bottom); /* Suporte para iPhone/Android modernos */
}

    </style>
</head>
<body>

<header class="bg-[#0f172a] p-4 text-white flex flex-col gap-3 shadow-md sticky top-0 z-50">
    <div class="flex justify-between items-center">
        <span class="text-xl font-bold tracking-tight">AssinaPDF<span class="text-blue-400">já</span></span>
        <button id="save-btn" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm font-bold transition disabled:opacity-30" disabled>Salvar e Baixar</button>
    </div>

    <div class="flex justify-between items-center bg-[#1e293b] p-2 rounded-lg">
        <div class="flex items-center gap-3">
            <span id="page-info" class="text-xs font-mono">Documento carregado</span>
        </div>
        <div class="flex gap-4 border-l border-slate-700 pl-4">
            <span class="text-xs self-center text-slate-400">Zoom:</span>
            <button onclick="changeZoom(-0.2)" class="font-bold text-lg">-</button>
            <button onclick="changeZoom(0.2)" class="font-bold text-lg">+</button>
        </div>
    </div>
</header>

    <main class="p-4 max-w-4xl mx-auto space-y-6">

        <section class="space-y-3">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-slate-700">1. Selecione o Documento</h2>
                <div class="flex gap-2">
                    <button onclick="changeZoom(-0.2)" class="bg-[#0f172a] text-white w-8 h-8 rounded-full shadow font-bold">-</button>
                    <button onclick="changeZoom(0.2)" class="bg-[#0f172a] text-white w-8 h-8 rounded-full shadow font-bold">+</button>
                </div>
            </div>

            <input type="file" id="pdf-input" accept="application/pdf" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 uppercase tracking-widest"/>

            <div class="pdf-area">
                <div id="pdf-wrapper">
                    <canvas id="pdf-canvas"></canvas>
                </div>
            </div>
        </section>

        <section class="text-center py-4">
            <h2 class="font-bold text-slate-700 mb-4">2. Criar Assinatura</h2>
            <button onclick="openSigFlow()" class="w-full bg-[#0f172a] text-white py-5 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                Assinar agora
            </button>
        </section>
    </main>

    <div id="sig-modal">
        <div id="orientation-msg" class="flex-1 flex flex-col items-center justify-center p-10 text-center space-y-4">
            <div class="text-5xl animate-bounce">🔄</div>
            <h2 class="text-2xl font-bold">Vire o celular</h2>
            <p class="text-slate-500">Para uma assinatura melhor, use o modo paisagem (deitado).</p>
            <button onclick="showPad()" class="bg-blue-600 text-white px-10 py-4 rounded-full font-bold shadow-lg">Estou pronto</button>
        </div>

        <div id="pad-container" class="hidden">
            <canvas id="signature-pad"></canvas>
            <div class="modal-footer">
                <button onclick="closeSigModal()" class="flex-1 py-3 bg-white text-slate-600 rounded-xl font-bold border border-slate-200">Cancelar</button>
                <button onclick="sigPad.clear()" class="flex-1 py-3 bg-white text-red-500 rounded-xl font-bold border border-slate-200">Limpar</button>
                <button onclick="confirmSignature()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-md">Confirmar</button>
            </div>
        </div>
    </div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const { PDFDocument } = PDFLib;

let pdfBytes, pdfPage, sigPad, currentScale = 1.0;
let pdfDoc = null;
let currentPage = 1;
let totalPages = 0;

// Objeto para guardar as assinaturas de cada página
// Estrutura: { 1: [div1, div2], 2: [div3], ... }
let signaturesByPage = {};

// --- Carregamento do PDF ---
document.getElementById('pdf-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    // Limpa assinaturas anteriores se carregar novo PDF
    document.querySelectorAll('.draggable-sig').forEach(el => el.remove());
    signaturesByPage = {};
    
    pdfBytes = await file.arrayBuffer();
    const loadingTask = pdfjsLib.getDocument({ data: pdfBytes });
    pdfDoc = await loadingTask.promise;
    totalPages = pdfDoc.numPages;
    currentPage = 1;

    loadPage(currentPage);
});

async function loadPage(num) {
    pdfPage = await pdfDoc.getPage(num);
    document.getElementById('page-info').textContent = `Pág: ${num} / ${totalPages}`;
    
    // 1. Esconder todas as assinaturas existentes
    document.querySelectorAll('.draggable-sig').forEach(el => el.style.display = 'none');
    
    // 2. Renderizar o PDF
    await renderPDF();
    
    // 3. Mostrar apenas as assinaturas da página atual
    if (signaturesByPage[num]) {
        signaturesByPage[num].forEach(sigDiv => {
            sigDiv.style.display = 'block';
        });
    }
}

function changePage(delta) {
    const newPage = currentPage + delta;
    if (newPage >= 1 && newPage <= totalPages) {
        currentPage = newPage;
        loadPage(currentPage);
    }
}

async function renderPDF() {
    if (!pdfPage) return;
    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');
    const viewport = pdfPage.getViewport({ scale: currentScale });
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await pdfPage.render({ canvasContext: ctx, viewport: viewport }).promise;
    document.getElementById('save-btn').disabled = false;
}

function changeZoom(delta) {
    currentScale = Math.min(Math.max(currentScale + delta, 0.5), 3);
    renderPDF();
    // Nota: O zoom idealmente deveria reajustar a posição das assinaturas, 
    // mas isso requer cálculos complexos de matriz. Para simplicidade, 
    // o usuário move a assinatura após o zoom.
}

// --- Fluxo de Assinatura ---
const modal = document.getElementById('sig-modal');
const sigCanvas = document.getElementById('signature-pad');
sigPad = new SignaturePad(sigCanvas);

function openSigFlow() {
    modal.style.display = 'flex';
    document.getElementById('orientation-msg').classList.remove('hidden');
    document.getElementById('pad-container').classList.add('hidden');
}

function showPad() {
    document.getElementById('orientation-msg').style.display = 'none';
    const container = document.getElementById('pad-container');
    container.style.display = 'flex';
    container.classList.remove('hidden');

    setTimeout(() => {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        sigCanvas.width = sigCanvas.offsetWidth * ratio;
        sigCanvas.height = sigCanvas.offsetHeight * ratio;
        sigCanvas.getContext("2d").scale(ratio, ratio);
        sigPad.clear();
    }, 150);
}

function closeSigModal() { modal.style.display = 'none'; }

function confirmSignature() {
    if (sigPad.isEmpty()) return alert("Desenhe sua assinatura!");
    const dataUrl = sigPad.toDataURL();
    const canvas = document.getElementById('pdf-canvas');
    
    // Centraliza no canvas visível
    createDraggableSignature(dataUrl, (canvas.width / 2) - 75, (canvas.height / 2) - 37);
    closeSigModal();
}

// --- Assinatura Manipulável (Vinculada à Página) ---
function createDraggableSignature(url, x, y) {
    const div = document.createElement('div');
    div.className = 'draggable-sig';
    div.style.width = '150px';
    div.style.height = '75px';
    div.style.left = x + 'px';
    div.style.top = y + 'px';
    div.style.position = 'absolute';
    
    // Guarda a qual página esta assinatura pertence
    div.dataset.page = currentPage;

    const img = document.createElement('img');
    img.src = url;
    img.style.width = '100%';
    img.style.height = '100%';
    img.style.pointerEvents = 'none';

    const controls = document.createElement('div');
    controls.className = 'sig-controls';
    controls.innerHTML = `
        <button onclick="rotateSig(this)">Girar</button>
        <button onclick="cloneSig(this)">Clonar</button>
        <button onclick="removeSig(this)" class="text-red-500">X</button>
    `;
    
    div.appendChild(controls);
    div.appendChild(img);

    document.getElementById('pdf-wrapper').appendChild(div);
    
    // Adiciona ao nosso controle de assinaturas por página
    if (!signaturesByPage[currentPage]) {
        signaturesByPage[currentPage] = [];
    }
    signaturesByPage[currentPage].push(div);
    
    makeDraggable(div);
}

function removeSig(btn) {
    const el = btn.parentElement.parentElement;
    const page = el.dataset.page;
    el.remove();
    
    // Remove do array de controle
    if (signaturesByPage[page]) {
        signaturesByPage[page] = signaturesByPage[page].filter(sig => sig !== el);
    }
}

function makeDraggable(el) {
    let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
    
    const start = (e) => {
        // Impede scroll da página ao arrastar no mobile
        if (e.type === 'touchstart') {
            // e.preventDefault(); // Pode causar problemas em alguns navegadores, teste com cuidado
        }
        p3 = e.clientX || e.touches[0].clientX;
        p4 = e.clientY || e.touches[0].clientY;
        document.onmouseup = document.ontouchend = end;
        document.onmousemove = document.ontouchmove = move;
    };
    
    const move = (e) => {
        const cx = e.clientX || e.touches[0].clientX;
        const cy = e.clientY || e.touches[0].clientY;
        p1 = p3 - cx;
        p2 = p4 - cy;
        p3 = cx;
        p4 = cy;
        
        // Contenção básica para não sair do canvas (opcional)
        const wrapper = document.getElementById('pdf-wrapper');
        let newTop = el.offsetTop - p2;
        let newLeft = el.offsetLeft - p1;
        
        // Limites (ajuste 20px de margem das ferramentas)
        newTop = Math.max(-20, Math.min(newTop, wrapper.offsetHeight - el.offsetHeight + 20));
        newLeft = Math.max(-20, Math.min(newLeft, wrapper.offsetWidth - el.offsetWidth + 20));

        el.style.top = newTop + "px";
        el.style.left = newLeft + "px";
    };
    
    const end = () => {
        document.onmouseup = document.onmousemove = document.ontouchend = document.ontouchmove = null;
    };
    
    el.onmousedown = el.ontouchstart = start;
}

function rotateSig(btn) {
    const el = btn.parentElement.parentElement;
    // Pega a rotação atual ou define 0
    let curr = el.dataset.rotation ? parseInt(el.dataset.rotation) : 0;
    curr = (curr + 90) % 360;
    el.dataset.rotation = curr; // Salva a rotação pura
    el.style.transform = `rotate(${curr}deg)`;
}

function cloneSig(btn) {
    const el = btn.parentElement.parentElement;
    const imgData = el.querySelector('img').src;
    
    // Cria um pequeno deslocamento para notar o clone
    const currentTop = parseInt(el.style.top);
    const currentLeft = parseInt(el.style.left);
    
    createDraggableSignature(imgData, currentLeft + 20, currentTop + 20);
}

// --- Salvar (Lógica para Múltiplas Páginas) ---
document.getElementById('save-btn').addEventListener('click', async () => {
    // Pega TODAS as assinaturas, independente da página que está visível
    const allSignatures = document.querySelectorAll('.draggable-sig');
    if (allSignatures.length === 0) return alert("Adicione ao menos uma assinatura.");
    
    // Mostra feedback visual de carregamento
    const btn = document.getElementById('save-btn');
    const originalText = btn.textContent;
    btn.textContent = "Processando...";
    btn.disabled = true;

    try {
        const pdfDocLib = await PDFDocument.load(pdfBytes);
        const pages = pdfDocLib.getPages();
        const canvas = document.getElementById('pdf-canvas');
        
        // É crucial usar o viewport original da página (scale 1) para o cálculo 
        // de proporção no salvamento, independente do zoom da tela.
        // Como o PDF.js carrega assincronamente, vamos iterar sobre as páginas do PDFLib
        
        for (const sig of allSignatures) {
            const pageNum = parseInt(sig.dataset.page);
            const sigImgData = sig.querySelector('img').src;
            const rotation = sig.dataset.rotation ? parseInt(sig.dataset.rotation) : 0;
            
            // O PDFLib usa índice 0, páginas são índice 1
            const pageIdx = pageNum - 1;
            if (pageIdx < 0 || pageIdx >= pages.length) continue;
            
            const pageLib = pages[pageIdx];
            const { width, height } = pageLib.getSize(); // Tamanho real da página PDF
            
            // Para calcular a posição correta, precisamos saber a proporção
            // entre o canvas que estava na tela quando a assinatura foi colocada
            // e o tamanho real da página do PDF.
            
            // Pegamos o viewport da página na escala 1:1 do PDF.js para ter a referência base
            const originalPagejs = await pdfDoc.getPage(pageNum);
            const originalViewport = originalPagejs.getViewport({ scale: 1.0 });
            
            // A proporção é baseada na escala atual da tela
            // Se a tela está com scale 1.5, o ratio é width / (original.width * 1.5)
            const ratio = width / (originalViewport.width * currentScale);

            const sigImg = await pdfDocLib.embedPng(sigImgData);
            
            // Posição na tela (relativa ao wrapper)
            const screenX = parseInt(sig.style.left);
            const screenY = parseInt(sig.style.top);
            
            // Convertendo para coordenadas do PDF (Y invertido)
            const pdfX = screenX * ratio;
            const pdfY = height - (screenY * ratio) - (sig.offsetHeight * ratio);

            pageLib.drawImage(sigImg, {
                x: pdfX,
                y: pdfY,
                width: sig.offsetWidth * ratio,
                height: sig.offsetHeight * ratio,
                rotate: PDFLib.degrees(-rotation), // PDFLib rotaciona anti-horário
            });
        }

        const saved = await pdfDocLib.save();
        const link = document.createElement('a');
        link.href = URL.createObjectURL(new Blob([saved], { type: "application/pdf" }));
        link.download = "documento_assinado.pdf";
        link.click();
        
    } catch (error) {
        console.error(error);
        alert("Ocorreu um erro ao salvar o PDF.");
    } finally {
        btn.textContent = originalText;
        btn.disabled = false;
    }
});

</script>
</body>
</html>
