<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assinador PDF MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        #signature-pad { touch-action: none; cursor: crosshair; width: 100%; height: 200px; }
        .pdf-viewport { width: 100%; background-color: #e2e8f0; border-radius: 12px; overflow: hidden; position: relative; display: flex; justify-content: center; }
        #pdf-canvas { display: block; max-width: 100%; height: auto; touch-action: auto; }
    </style>
</head>
<body class="pb-10">

    <main class="max-w-md mx-auto px-4 mt-6 space-y-6">
        <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-md font-bold mb-3">1. Selecione o PDF</h2>
            <input type="file" id="pdf-input" accept="application/pdf" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
        </section>

        <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-md font-bold mb-3">2. Desenhe sua Assinatura</h2>
            <div class="border border-slate-200 rounded-lg bg-slate-50">
                <canvas id="signature-pad"></canvas>
            </div>
            <button id="clear-btn" class="w-full mt-2 text-xs font-bold text-red-500 py-2 uppercase">Limpar</button>
        </section>

        <section id="preview-section" class="hidden bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-4">
            <h2 class="text-md font-bold text-center">3. Toque no local para assinar</h2>
            <div class="pdf-viewport">
                <canvas id="pdf-canvas"></canvas>
            </div>
            <button id="download-btn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg disabled:opacity-30" disabled>
                Finalizar e Baixar PDF
            </button>
        </section>
    </main>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const { PDFDocument } = PDFLib;
    let pdfBytes = null, signaturePos = null, pdfRenderedPage = null, currentScale = 1.0;

    // --- Pad de Assinatura ---
    const sigCanvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(sigCanvas);
    function resizeSig() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        sigCanvas.width = sigCanvas.offsetWidth * ratio;
        sigCanvas.height = sigCanvas.offsetHeight * ratio;
        sigCanvas.getContext("2d").scale(ratio, ratio);
        signaturePad.clear();
    }
    window.addEventListener("resize", resizeSig);
    resizeSig();
    document.getElementById('clear-btn').addEventListener('click', () => signaturePad.clear());

    // --- PDF Render ---
    document.getElementById('pdf-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        pdfBytes = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: pdfBytes }).promise;
        pdfRenderedPage = await pdf.getPage(1);
        renderPreview();
        document.getElementById('preview-section').classList.remove('hidden');
    });

    async function renderPreview(markX = null, markY = null) {
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const containerWidth = canvas.parentElement.clientWidth;
        const unscaledViewport = pdfRenderedPage.getViewport({ scale: 1 });
        currentScale = containerWidth / unscaledViewport.width;
        const viewport = pdfRenderedPage.getViewport({ scale: currentScale });

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await pdfRenderedPage.render({ canvasContext: ctx, viewport: viewport }).promise;

        // Se houver uma marcação, desenha a assinatura real (ou um placeholder) no preview
        if (markX && markY) {
            if (!signaturePad.isEmpty()) {
                const img = new Image();
                img.src = signaturePad.toDataURL();
                img.onload = () => {
                    ctx.drawImage(img, markX - 50, markY - 25, 100, 50);
                    // Borda de marcação
                    ctx.strokeStyle = "#2563eb";
                    ctx.setLineDash([5, 5]);
                    ctx.strokeRect(markX - 50, markY - 25, 100, 50);
                };
            }
        }
    }

    // --- Eventos de Toque ---
    const canvasEl = document.getElementById('pdf-canvas');
    let startY = 0;
    canvasEl.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; }, { passive: true });
    canvasEl.addEventListener('touchend', (e) => {
        if (Math.abs(startY - e.changedTouches[0].clientY) < 10) {
            handlePoint(e.changedTouches[0]);
        }
    });
    canvasEl.addEventListener('mousedown', (e) => handlePoint(e));

    function handlePoint(e) {
        if (signaturePad.isEmpty()) return alert("Assine no Passo 2 primeiro!");
        const rect = canvasEl.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        signaturePos = { x: x / currentScale, y: (pdfRenderedPage.getViewport({ scale: 1 }).height) - (y / currentScale) };
        renderPreview(x, y);
        document.getElementById('download-btn').disabled = false;
    }

    // --- Download ---
    document.getElementById('download-btn').addEventListener('click', async () => {
        const finalDoc = await PDFDocument.load(pdfBytes);
        const sigImage = await finalDoc.embedPng(signaturePad.toDataURL());
        const page = finalDoc.getPages()[0];
        page.drawImage(sigImage, { x: signaturePos.x - 50, y: signaturePos.y - 25, width: 100, height: 50 });
        const pdfData = await finalDoc.save();
        const blob = new Blob([pdfData], { type: 'application/pdf' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "assinado.pdf";
        link.click();
    });
</script>
</body>
</html>
