<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AssinaPDFjá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }

        /* Estilo da Barra Superior */
        header { z-index: 50; position: sticky; top: 0; }

/* Seleciona os botões de zoom baseando-se no layout atual */
.flex.gap-2 button {
    background-color: #2563eb !important; /* Azul do Tailwind blue-600 */
    color: white !important;
    transition: background-color 0.2s;
}

.flex.gap-2 button:hover {
    background-color: #1d4ed8 !important; /* Azul um pouco mais escuro para o hover */
}


/* Remove a rolagem da página inteira */
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    background-color: #f8fafc;
    display: flex;
    flex-direction: column;
}

/* O Header fica fixo no topo naturalmente por não estar na área de scroll */
header {
    flex-shrink: 0; /* Impede o header de encolher */
}

/* Esta é a área mágica: ela ocupa o meio e permite o scroll do PDF */
.content-area {
    flex: 1; /* Ocupa todo o espaço entre o topo e o botão */
    overflow-y: auto; /* Ativa a rolagem vertical */
    padding: 20px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Container do PDF Corrigido */
.pdf-container {
    position: relative;
    overflow: auto;
    /* MUDANÇA: Fundo branco para visual profissional */
    background: #ffffff; 
    border-radius: 8px;
    min-height: 400px;
    padding: 10px; /* Pequeno espaçamento para não colar na borda */
}

/* Ajuste para empilhar as páginas */
/* O container onde as páginas do PDF são injetadas */
#pdf-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* Cada folha do PDF */
.page-block {
    position: relative;
    background: white;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* Container de cada página individual */
.page-container {
    position: relative;
    background: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.pdf-area {
    width: 100%;
    background: #ffffff; /* Fundo branco conforme solicitado */
    display: flex;
    justify-content: center;
    padding: 20px 0;
    overflow-y: auto; /* Permite rolagem */
}

#pdf-canvas { 
    display: block; 
    background: white; 
    box-shadow: 0 0 20px rgba(0,0,0,0.05); /* Sombra sutil para borda */
}

/* Container Principal da Assinatura Flutuante */
.draggable-sig {
    position: absolute;
    border: 2px dashed #3b82f6; /* Borda azul pontilhada */
    background: rgba(59, 130, 246, 0.03);
    cursor: move;
    z-index: 10;
    touch-action: none; /* Melhora arraste no mobile */
}

/* Esconde os controles quando não estiver interagindo (opcional, para limpar visual) */
.draggable-sig:not(:hover) .sig-controls,
.draggable-sig:not(:hover) .rotate-handle,
.draggable-sig:not(:hover) .resizer {
    opacity: 0.8;
}

/* Balão Superior (Clonar e Lixeira) */
.sig-controls {
    position: absolute;
    top: -55px; /* Flutua acima da borda */
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    background: white;
    padding: 8px 16px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    z-index: 100;
    border: 1px solid #f1f5f9;
    pointer-events: auto !important; /* Garante clique */
}

/* Separador vertical entre clonar e lixeira */
.sig-controls .divider {
    w-px;
    h-4;
    background-color: #e2e8f0;
    align-self: center;
}

/* Botão de Giro Manual Separado (à direita) */
.rotate-handle {
    position: absolute;
    right: -45px; /* Fora da borda, centralizado verticalmente */
    top: 50%;
    transform: translateY(-50%);
    width: 32px;
    height: 32px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    cursor: grab;
    z-index: 30;
    border: 1px solid #e2e8f0;
    pointer-events: auto !important;
}

.rotate-handle:active { cursor: grabbing; }

/* Alças de Redimensionamento (Bolinhas brancas nos cantos) */
.resizer {
    width: 12px;
    height: 12px;
    background: white;
    border: 2px solid #3b82f6;
    border-radius: 50%;
    position: absolute;
    z-index: 20;
    pointer-events: auto !important;
}
.resizer.nw { top: -6px; left: -6px; cursor: nw-resize; }
.resizer.ne { top: -6px; right: -6px; cursor: ne-resize; }
.resizer.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
.resizer.se { bottom: -6px; right: -6px; cursor: se-resize; }


        /* Modal de Assinatura */
#sig-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: white;
    z-index: 100;
    flex-direction: column;
    /* Usa a altura dinâmica para considerar barras do navegador */
    height: 100dvh; 
    width: 100vw;
    overflow: hidden;
}

#pad-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
    /* Evita que o conteúdo empurre os botões para fora */
    overflow: hidden; 
}

#signature-pad {
    flex: 1; /* Ocupa todo o espaço central disponível */
    width: 100%;
    touch-action: none;
    background: #fdfdfd;
    border-bottom: 1px solid #eee;
}

/* Esconde o rodapé do modal por padrão */
.modal-footer {
    display: none !important; /* Força o desaparecimento inicial */
    gap: 10px;
    padding: 10px 15px;
    background: white;
    flex-shrink: 0;
}

/* Classe que será adicionada via JS para mostrar os botões */
.modal-footer.show {
    display: flex !important;
}

/* O botão de assinar fica fixo na base */
.footer-actions {
    flex-shrink: 0;
    padding: 15px;
    background: white;
    box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
    z-index: 40;
}

/* Modal de Confirmação de Exclusão */
#delete-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
}

.delete-card {
    background: white;
    padding: 24px;
    border-radius: 16px;
    width: 90%;
    max-width: 320px;
    text-align: center;
}


    </style>
</head>
<body>

<header class="bg-[#0f172a] p-4 text-white shadow-md">
    <div class="flex justify-between items-center max-w-4xl mx-auto">
        <span class="text-xl font-bold tracking-tight">AssinaPDF<span class="text-blue-400">já</span></span>
        <button id="save-btn" class="bg-blue-600 hover:bg-blue-600 px-4 py-2 rounded-lg text-sm font-bold transition disabled:opacity-100" disabled>Salvar e Baixar</button>
    </div>
</header>

<main class="content-area">
    <div class="max-w-4xl w-full">
        <section class="bg-white p-4 rounded-xl shadow-sm mb-6 border border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-slate-700">1. Selecione o Documento</h2>
<div class="flex gap-2">
    <button onclick="changeZoom(-0.2)" class="bg-blue-600 hover:bg-blue-700 text-white w-8 h-8 rounded-full shadow font-bold transition-colors">-</button>    
    <button onclick="changeZoom(0.2)" class="bg-blue-600 hover:bg-blue-700 text-white w-8 h-8 rounded-full shadow font-bold transition-colors">+</button>
</div>

            </div>
            <input type="file" id="pdf-input" accept="application/pdf" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700"/>
        </section>

        <div id="pdf-wrapper"></div>
    </div>
</main>

<footer class="footer-actions">
    <div class="max-w-4xl mx-auto">
<button onclick="openSigFlow()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg ...">
    Assinar agora
</button>
    </div>
</footer>

    <div id="sig-modal">
        <div id="orientation-msg" class="flex-1 flex flex-col items-center justify-center p-10 text-center space-y-4">
            <div class="text-5xl animate-bounce">🔄</div>
            <h2 class="text-2xl font-bold">Vire o celular</h2>
            <p class="text-slate-500">Para uma assinatura melhor, use o modo paisagem (deitado).</p>
            <button onclick="showPad()" class="bg-blue-600 text-white px-10 py-4 rounded-full font-bold shadow-lg">Estou pronto</button>
        </div>

        <div id="pad-container" class="hidden">
            <canvas id="signature-pad"></canvas>
            <div class="modal-footer">
                <button onclick="closeSigModal()" class="flex-1 py-3 bg-white text-slate-600 rounded-xl font-bold border border-slate-200">Cancelar</button>
                <button onclick="sigPad.clear()" class="flex-1 py-3 bg-white text-red-500 rounded-xl font-bold border border-slate-200">Limpar</button>
                <button onclick="confirmSignature()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-md">Confirmar</button>
            </div>
        </div>
    </div>

<div id="delete-modal">
    <div class="delete-card shadow-2xl">
        <div class="text-4xl mb-4">🗑️</div>
        <h3 class="text-xl font-bold mb-4 text-slate-800">Deseja apagar as assinaturas?</h3>
        <div class="flex flex-col gap-3">
            <button onclick="executeDelete('all')" class="w-full py-3 bg-[#ef4444] text-white rounded-xl font-bold">TODAS DO PDF</button>
            <button onclick="executeDelete('page')" class="w-full py-3 bg-[#0f172a] text-white rounded-xl font-bold">APENAS DESTA PÁGINA</button>
            <button onclick="closeDeleteModal()" class="w-full py-3 bg-slate-200 text-slate-600 rounded-xl font-bold">CANCELAR</button>
        </div>
    </div>
</div>


<script>

// ... (mantenha as definições globais e renderização de PDF até a linha 315) ...

function confirmSignature() {
    if (sigPad.isEmpty()) return alert("Desenhe sua assinatura!");
    const dataUrl = sigPad.toDataURL();
    
    // Alvo: Sempre a primeira página visível ou o container
    const targetPage = document.querySelector('.page-block');
    if(!targetPage) return alert("Carregue um PDF primeiro");

    const scrollArea = document.querySelector('.content-area');
    const scrollOffset = scrollArea.scrollTop;

    // Cria a assinatura
    createDraggableSignature(dataUrl, targetPage, 50, scrollOffset + 50);
    closeSigModal();
}

function createDraggableSignature(url, targetPage, left = 50, top = 100) {
    const div = document.createElement('div');
    div.className = 'draggable-sig absolute';
    div.style.width = '150px';
    div.style.height = '75px';
    div.style.left = left + 'px';
    div.style.top = top + 'px';
    div.dataset.rotation = 0;

    div.innerHTML = `
        <div class="sig-controls" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
            <button onclick="replicateSig(this)" class="flex items-center gap-1.5 text-slate-700 font-bold text-sm">
                <span class="text-blue-500 text-base">📋</span> Copiar
            </button>
            <div class="divider"></div>
            <button onclick="askDelete(this)" class="text-red-500 font-bold text-sm hover:text-red-600">✕</button>
        </div>
        <div class="rotate-handle" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </div>
        <div class="resizer nw"></div><div class="resizer ne"></div>
        <div class="resizer sw"></div><div class="resizer se"></div>
        <img src="${url}" class="w-full h-full pointer-events-none select-none">
    `;

    targetPage.appendChild(div);
    initAdvancedControls(div); 
}

// CORREÇÃO DA CLONAGEM
function replicateSig(btn) {
    const original = btn.closest('.draggable-sig');
    const parentPage = original.parentElement;
    const url = original.querySelector('img').src;
    
    // Cria o clone um pouco deslocado para não ficar exatamente em cima
    const newLeft = parseInt(original.style.left) + 20;
    const newTop = parseInt(original.style.top) + 20;
    
    createDraggableSignature(url, parentPage, newLeft, newTop);
}

// GESTÃO ÚNICA DE EXCLUSÃO
let elementToDelete = null;
function askDelete(btn) {
    elementToDelete = btn.closest('.draggable-sig');
    document.getElementById('delete-modal').style.display = 'flex';
}

function executeDelete(mode) {
    if (mode === 'page' && elementToDelete) {
        elementToDelete.remove();
    } else if (mode === 'all') {
        document.querySelectorAll('.draggable-sig').forEach(s => s.remove());
    }
    closeDeleteModal();
}

function closeDeleteModal() {
    document.getElementById('delete-modal').style.display = 'none';
    elementToDelete = null;
}

// CONTROLES AVANÇADOS (DRAG, ROTATE, RESIZE)
function initAdvancedControls(el) {
    let isDragging = false;
    let isRotating = false;
    let isResizing = false;

    // Mouse Down Global no Elemento
    el.onmousedown = function(e) {
        if (e.target.closest('.sig-controls') || e.target.closest('.rotate-handle') || e.target.classList.contains('resizer')) return;

        isDragging = true;
        let startX = e.clientX - el.offsetLeft;
        let startY = e.clientY - el.offsetTop;

        const onMouseMove = (ev) => {
            if (!isDragging) return;
            el.style.left = (ev.clientX - startX) + 'px';
            el.style.top = (ev.clientY - startY) + 'px';
        };

        const onMouseUp = () => {
            isDragging = false;
            window.removeEventListener('mousemove', onMouseMove);
        };

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
    };

    // Rotação
    const rotateHandle = el.querySelector('.rotate-handle');
    rotateHandle.onmousedown = function(e) {
        isRotating = true;
        const rect = el.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        const onRotate = (ev) => {
            const angle = Math.atan2(ev.clientY - centerY, ev.clientX - centerX);
            const deg = angle * (180 / Math.PI);
            el.dataset.rotation = deg;
            el.style.transform = `rotate(${deg}deg)`;
        };

        window.addEventListener('mousemove', onRotate);
        window.addEventListener('mouseup', () => {
            isRotating = false;
            window.removeEventListener('mousemove', onRotate);
        });
    };

    // Redimensionamento (Exemplo simplificado para SE)
    const se = el.querySelector('.resizer.se');
    se.onmousedown = function(e) {
        isResizing = true;
        let startW = el.offsetWidth;
        let startH = el.offsetHeight;
        let startX = e.clientX;
        let startY = e.clientY;

        const onResize = (ev) => {
            el.style.width = (startW + (ev.clientX - startX)) + 'px';
            el.style.height = (startH + (ev.clientY - startY)) + 'px';
        };

        window.addEventListener('mousemove', onResize);
        window.addEventListener('mouseup', () => {
            isResizing = false;
            window.removeEventListener('mousemove', onResize);
        });
    };
}


</script>
</body>
</html>
