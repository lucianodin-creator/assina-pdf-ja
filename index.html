<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AssinaPDFjá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }

        /* Estilo da Barra Superior */
        header { z-index: 50; position: sticky; top: 0; }

/* Seleciona os botões de zoom baseando-se no layout atual */
.flex.gap-2 button {
    background-color: #2563eb !important; /* Azul do Tailwind blue-600 */
    color: white !important;
    transition: background-color 0.2s;
}

.flex.gap-2 button:hover {
    background-color: #1d4ed8 !important; /* Azul um pouco mais escuro para o hover */
}


/* Remove a rolagem da página inteira */
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    background-color: #f8fafc;
    display: flex;
    flex-direction: column;
}

/* O Header fica fixo no topo naturalmente por não estar na área de scroll */
header {
    flex-shrink: 0; /* Impede o header de encolher */
}

/* Esta é a área mágica: ela ocupa o meio e permite o scroll do PDF */
.content-area {
    flex: 1; /* Ocupa todo o espaço entre o topo e o botão */
    overflow-y: auto; /* Ativa a rolagem vertical */
    padding: 20px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Container do PDF Corrigido */
.pdf-container {
    position: relative;
    overflow: auto;
    /* MUDANÇA: Fundo branco para visual profissional */
    background: #ffffff; 
    border-radius: 8px;
    min-height: 400px;
    padding: 10px; /* Pequeno espaçamento para não colar na borda */
}

/* Ajuste para empilhar as páginas */
/* O container onde as páginas do PDF são injetadas */
#pdf-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* Cada folha do PDF */
.page-block {
    position: relative;
    background: white;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* Container de cada página individual */
.page-container {
    position: relative;
    background: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.pdf-area {
    width: 100%;
    background: #ffffff; /* Fundo branco conforme solicitado */
    display: flex;
    justify-content: center;
    padding: 20px 0;
    overflow-y: auto; /* Permite rolagem */
}

#pdf-canvas { 
    display: block; 
    background: white; 
    box-shadow: 0 0 20px rgba(0,0,0,0.05); /* Sombra sutil para borda */
}

/* Container Principal da Assinatura Flutuante */
.draggable-sig {
    position: absolute;
    border: 2px dashed #3b82f6; /* Borda azul pontilhada */
    background: rgba(59, 130, 246, 0.03);
    cursor: move;
    z-index: 10;
    touch-action: none; /* Melhora arraste no mobile */
}

/* Esconde os controles quando não estiver interagindo (opcional, para limpar visual) */
.draggable-sig:not(:hover) .sig-controls,
.draggable-sig:not(:hover) .rotate-handle,
.draggable-sig:not(:hover) .resizer {
    opacity: 0.8;
}

/* Balão Superior (Clonar e Lixeira) */
.sig-controls {
    position: absolute;
    top: -55px; /* Flutua acima da borda */
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    background: white;
    padding: 8px 16px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    z-index: 100;
    border: 1px solid #f1f5f9;
    pointer-events: auto !important; /* Garante clique */
}

/* Separador vertical entre clonar e lixeira */
.sig-controls .divider {
    w-px;
    h-4;
    background-color: #e2e8f0;
    align-self: center;
}

/* Botão de Giro Manual Separado (à direita) */
.rotate-handle {
    position: absolute;
    right: -45px; /* Fora da borda, centralizado verticalmente */
    top: 50%;
    transform: translateY(-50%);
    width: 32px;
    height: 32px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    cursor: grab;
    z-index: 30;
    border: 1px solid #e2e8f0;
    pointer-events: auto !important;
}

.rotate-handle:active { cursor: grabbing; }

/* Alças de Redimensionamento (Bolinhas brancas nos cantos) */
.resizer {
    width: 12px;
    height: 12px;
    background: white;
    border: 2px solid #3b82f6;
    border-radius: 50%;
    position: absolute;
    z-index: 20;
    pointer-events: auto !important;
}
.resizer.nw { top: -6px; left: -6px; cursor: nw-resize; }
.resizer.ne { top: -6px; right: -6px; cursor: ne-resize; }
.resizer.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
.resizer.se { bottom: -6px; right: -6px; cursor: se-resize; }


        /* Modal de Assinatura */
#sig-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: white;
    z-index: 100;
    flex-direction: column;
    /* Usa a altura dinâmica para considerar barras do navegador */
    height: 100dvh; 
    width: 100vw;
    overflow: hidden;
}

#pad-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
    /* Evita que o conteúdo empurre os botões para fora */
    overflow: hidden; 
}

#signature-pad {
    flex: 1; /* Ocupa todo o espaço central disponível */
    width: 100%;
    touch-action: none;
    background: #fdfdfd;
    border-bottom: 1px solid #eee;
}

/* Esconde o rodapé do modal por padrão */
.modal-footer {
    display: none !important; /* Força o desaparecimento inicial */
    gap: 10px;
    padding: 10px 15px;
    background: white;
    flex-shrink: 0;
}

/* Classe que será adicionada via JS para mostrar os botões */
.modal-footer.show {
    display: flex !important;
}

/* O botão de assinar fica fixo na base */
.footer-actions {
    flex-shrink: 0;
    padding: 15px;
    background: white;
    box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
    z-index: 40;
}

/* Modal de Confirmação de Exclusão */
#delete-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
}

.delete-card {
    background: white;
    padding: 24px;
    border-radius: 16px;
    width: 90%;
    max-width: 320px;
    text-align: center;
}


    </style>
</head>
<body>

<header class="bg-[#0f172a] p-4 text-white shadow-md">
    <div class="flex justify-between items-center max-w-4xl mx-auto">
        <span class="text-xl font-bold tracking-tight">AssinaPDF<span class="text-blue-400">já</span></span>
        <button id="save-btn" class="bg-blue-600 hover:bg-blue-600 px-4 py-2 rounded-lg text-sm font-bold transition disabled:opacity-100" disabled>Salvar e Baixar</button>
    </div>
</header>

<main class="content-area">
    <div class="max-w-4xl w-full">
        <section class="bg-white p-4 rounded-xl shadow-sm mb-6 border border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-slate-700">1. Selecione o Documento</h2>
<div class="flex gap-2">
    <button onclick="changeZoom(-0.2)" class="bg-blue-600 hover:bg-blue-700 text-white w-8 h-8 rounded-full shadow font-bold transition-colors">-</button>    
    <button onclick="changeZoom(0.2)" class="bg-blue-600 hover:bg-blue-700 text-white w-8 h-8 rounded-full shadow font-bold transition-colors">+</button>
</div>

            </div>
            <input type="file" id="pdf-input" accept="application/pdf" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700"/>
        </section>

        <div id="pdf-wrapper"></div>
    </div>
</main>

<footer class="footer-actions">
    <div class="max-w-4xl mx-auto">
<button onclick="openSigFlow()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg ...">
    Assinar agora
</button>
    </div>
</footer>

    <div id="sig-modal">
        <div id="orientation-msg" class="flex-1 flex flex-col items-center justify-center p-10 text-center space-y-4">
            <div class="text-5xl animate-bounce">🔄</div>
            <h2 class="text-2xl font-bold">Vire o celular</h2>
            <p class="text-slate-500">Para uma assinatura melhor, use o modo paisagem (deitado).</p>
            <button onclick="showPad()" class="bg-blue-600 text-white px-10 py-4 rounded-full font-bold shadow-lg">Estou pronto</button>
        </div>

        <div id="pad-container" class="hidden">
            <canvas id="signature-pad"></canvas>
            <div class="modal-footer">
                <button onclick="closeSigModal()" class="flex-1 py-3 bg-white text-slate-600 rounded-xl font-bold border border-slate-200">Cancelar</button>
                <button onclick="sigPad.clear()" class="flex-1 py-3 bg-white text-red-500 rounded-xl font-bold border border-slate-200">Limpar</button>
                <button onclick="confirmSignature()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-md">Confirmar</button>
            </div>
        </div>
    </div>

<div id="delete-modal">
    <div class="delete-card shadow-2xl">
        <div class="text-4xl mb-4">🗑️</div>
        <h3 class="text-xl font-bold mb-4 text-slate-800">Deseja apagar as assinaturas?</h3>
        <div class="flex flex-col gap-3">
            <button onclick="executeDelete('all')" class="w-full py-3 bg-[#ef4444] text-white rounded-xl font-bold">TODAS DO PDF</button>
            <button onclick="executeDelete('page')" class="w-full py-3 bg-[#0f172a] text-white rounded-xl font-bold">APENAS DESTA PÁGINA</button>
            <button onclick="closeDeleteModal()" class="w-full py-3 bg-slate-200 text-slate-600 rounded-xl font-bold">CANCELAR</button>
        </div>
    </div>
</div>


<script>

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const { PDFDocument, degrees } = PDFLib;

// Estado Global
let pdfBytes = null;
let pdfDocJS = null;
let currentScale = 1.2;
const wrapper = document.getElementById('pdf-wrapper');
const saveBtn = document.getElementById('save-btn');

// Inicialização do Signature Pad
const sigCanvas = document.getElementById('signature-pad');
const sigPad = new SignaturePad(sigCanvas);

// --- 1. Carregamento e Renderização ---

document.getElementById('pdf-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // Reset de estado
    wrapper.innerHTML = '';
    document.querySelectorAll('.draggable-sig').forEach(el => el.remove());
    saveBtn.disabled = true;

    pdfBytes = await file.arrayBuffer();
    pdfDocJS = await pdfjsLib.getDocument({ data: pdfBytes }).promise;
    
    renderAllPages();
});

async function renderAllPages() {
    wrapper.innerHTML = ''; // Limpa o wrapper para re-renderizar (zoom)
    
    for (let i = 1; i <= pdfDocJS.numPages; i++) {
        const page = await pdfDocJS.getPage(i);
        const viewport = page.getViewport({ scale: currentScale });

        // Container da Página (Essencial para posicionar assinaturas)
        const pageContainer = document.createElement('div');
        pageContainer.className = 'page-block relative bg-white shadow-lg mb-6 mx-auto';
        pageContainer.dataset.pageNum = i;
        pageContainer.style.width = `${viewport.width}px`;
        pageContainer.style.height = `${viewport.height}px`;

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = viewport.width;
        canvas.height = viewport.height;

        pageContainer.appendChild(canvas);
        wrapper.appendChild(pageContainer);

        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
    }
    saveBtn.disabled = false;
}

function changeZoom(delta) {
    if (!pdfDocJS) return;
    currentScale = Math.min(Math.max(currentScale + delta, 0.5), 3);
    renderAllPages();
    // Nota: Em um sistema robusto, reajustaríamos as assinaturas existentes aqui.
}

// --- 2. Gestão de Assinaturas ---

function openSigFlow() {
    // Abre o modal
    document.getElementById('sig-modal').style.display = 'flex';
    document.getElementById('orientation-msg').classList.remove('hidden');
    document.getElementById('pad-container').classList.add('hidden');
    
    // Trava a rolagem do fundo
    document.querySelector('.content-area').style.overflow = 'hidden';
}

function showPad() {
    // 1. Esconde a mensagem de orientação
    document.getElementById('orientation-msg').style.display = 'none';
    
    // 2. Mostra o container do canvas
    const container = document.getElementById('pad-container');
    container.style.display = 'flex';
    container.classList.remove('hidden');

    // 3. MOSTRA OS BOTÕES (Confirmar, Limpar, Cancelar)
    const footer = document.querySelector('.modal-footer');
    if (footer) {
        footer.classList.add('show');
    }

    // Ajuste de resolução do Canvas
    setTimeout(() => {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        sigCanvas.width = sigCanvas.offsetWidth * ratio;
        sigCanvas.height = sigCanvas.offsetHeight * ratio;
        sigCanvas.getContext("2d").scale(ratio, ratio);
        sigPad.clear();
    }, 200);
}

function closeSigModal() {
    document.getElementById('sig-modal').style.display = 'none';
    
    // Esconde os botões novamente para a próxima vez
    const footer = document.querySelector('.modal-footer');
    if (footer) {
        footer.classList.remove('show');
    }
    
    // Devolve a rolagem da página (se aplicável)
    if (document.querySelector('.content-area')) {
        document.querySelector('.content-area').style.overflowY = 'auto';
    }
}


function confirmSignature() {
    if (sigPad.isEmpty()) return alert("Desenhe sua assinatura!");
    const dataUrl = sigPad.toDataURL();
    
    // Pegamos a primeira página para servir de referência ou o wrapper
    const targetPage = document.querySelector('.page-block') || document.getElementById('pdf-wrapper');
    
    // Descobrimos quanto o usuário rolou a área interna
    const scrollOffset = document.querySelector('.content-area').scrollTop;

    // Criamos a assinatura um pouco abaixo de onde o scroll está
    createDraggableSignature(dataUrl, targetPage);
    
    // Ajuste opcional: posiciona a assinatura visualmente no centro da visão atual
    const newSig = targetPage.lastElementChild;
    newSig.style.top = (scrollOffset + 100) + "px"; 

    closeSigModal();
}

let elementToDelete = null;


function createDraggableSignature(url, targetPage) {
    const div = document.createElement('div');
    div.className = 'draggable-sig absolute';
    // Define tamanho inicial padrão
    div.style.width = '150px';
    div.style.height = '75px';
    div.style.left = '50px';
    div.style.top = '100px';
    div.dataset.rotation = 0; // Armazena rotação pura

    // Injeta o HTML estruturado (Balão, Giro e Alças)
    div.innerHTML = `
        <div class="sig-controls" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
            <button onclick="replicateSig(this)" class="flex items-center gap-1.5 text-slate-700 font-bold text-sm">
                <span class="text-blue-500 text-base">📋</span> Copiar
            </button>
            <div class="divider"></div>
            <button onclick="askDelete(this)" class="text-red-500 font-bold text-sm hover:text-red-600">✕</button>
        </div>

        <div class="rotate-handle" title="Girar Manualmente" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </div>

        <div class="resizer nw"></div>
        <div class="resizer ne"></div>
        <div class="resizer sw"></div>
        <div class="resizer se"></div>

        <img src="${url}" class="w-full h-full pointer-events-none select-none">
    `;

    targetPage.appendChild(div);
    
    // Inicializa os controles avançados (drag, girar, resize)
    initAdvancedControls(div);
}

// FUNÇÃO CLONAR: Reatribui os controles para o clone funcionar
function replicateSig(btn) {
    // ... (sua lógica de clonagem para todas as páginas)
    // IMPORTANTE: Após page.appendChild(clone), chame:
    // initAdvancedControls(clone);
}

// GESTÃO AVANÇADA DE INTERAÇÃO (Giro e Resize Manual)
function initAdvancedControls(el) {
    // 1. Lógica de Arraste (Drag) - Impede conflito com botões
    el.onmousedown = el.ontouchstart = function(e) {
        if (e.target.closest('button') || e.target.closest('.rotate-handle') || e.target.closest('.resizer')) {
            return; // Não inicia drag se clicar nos controles
        }
        // ... (seu código de arrastar existente)
    };

    // 2. Lógica de Giro Manual (Botão separado)
    const rotateHandle = el.querySelector('.rotate-handle');
    rotateHandle.addEventListener('mousedown', (e) => {
        const rect = el.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        const onMove = (me) => {
            const angle = Math.atan2(me.clientY - centerY, me.clientX - centerX);
            const deg = angle * (180 / Math.PI);
            el.dataset.rotation = deg; // Salva para o PDFLib
            el.style.transform = `rotate(${deg}deg)`;
        };

        const onUp = () => {
            window.removeEventListener('mousemove', onMove);
            window.removeEventListener('mouseup', onUp);
        };

        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
    });

    // 3. Lógica de Redimensionamento (Alças)
    el.querySelectorAll('.resizer').forEach(resizer => {
        resizer.addEventListener('mousedown', (e) => {
            e.stopPropagation(); // Impede girar/arrastar
            const handle = e.target;
            const startW = el.offsetWidth;
            const startH = el.offsetHeight;
            const startX = e.clientX;
            const startY = e.clientY;
            const startL = el.offsetLeft;
            const startT = el.offsetTop;

            const onMove = (me) => {
                const diffX = me.clientX - startX;
                const diffY = me.clientY - startY;

                // Lógica para alça inferior direita (se) - mais comum
                if (handle.classList.contains('se')) {
                    el.style.width = (startW + diffX) + 'px';
                    el.style.height = (startH + diffY) + 'px';
                }
                // Implementar nw, ne, sw conforme necessário seguindo a lógica de inversão
            };

            const onUp = () => {
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onUp);
            };

            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
        });
    });
}



// GESTÃO DE EXCLUSÃO (Conforme Print 2)

let targetSig = null;

let signatureToConfirm = null;

function askDelete(btn) {
    signatureToConfirm = btn.closest('.draggable-sig');
    document.getElementById('delete-modal').style.display = 'flex';
}

function closeDeleteModal() {
    document.getElementById('delete-modal').style.display = 'none';
    signatureToConfirm = null;
}

function executeDelete(mode) {
    if (mode === 'page') {
        if (signatureToConfirm) signatureToConfirm.remove();
    } else if (mode === 'all') {
        document.querySelectorAll('.draggable-sig').forEach(sig => sig.remove());
    }
    closeDeleteModal();
}


function executeDelete(mode) {
    if (mode === 'page') {
        if (targetSig) targetSig.remove();
    } else if (mode === 'all') {
        document.querySelectorAll('.draggable-sig').forEach(s => s.remove());
    }
    closeDeleteModal();
}


function executeDelete(mode) {
    if (mode === 'page') {
        if (targetSig) targetSig.remove();
    } else if (mode === 'all') {
        document.querySelectorAll('.draggable-sig').forEach(s => s.remove());
    }
    closeDeleteModal();
}


function closeDeleteModal() {
    document.getElementById('delete-modal').style.display = 'none';
    elementToDelete = null;
}

function executeDelete(mode) {
    if (mode === 'page') {
        // Remove apenas a assinatura selecionada
        if (elementToDelete) elementToDelete.remove();
    } else if (mode === 'all') {
        // Remove todas as assinaturas do documento
        document.querySelectorAll('.draggable-sig').forEach(sig => sig.remove());
    }
    closeDeleteModal();
}

// ROTAÇÃO MANUAL
function rotateSig(btn) {
    const el = btn.closest('.draggable-sig');
    let deg = parseInt(el.dataset.rotation || 0);
    deg = (deg + 90) % 360; // Gira 90 graus a cada clique
    el.dataset.rotation = deg;
    el.querySelector('img').style.transform = `rotate(${deg}deg)`;
}


// --- 3. Interatividade (Drag & Drop) ---

function initAdvancedControls(el) {
    let isDragging = false;
    let isRotating = false;
    let isResizing = false;
    let currentResizer = null;

    // --- ARRASTAR ---
    el.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('resizer') || e.target.closest('.rotate-handle') || e.target.closest('.sig-controls')) return;
        isDragging = true;
        let startX = e.clientX - el.offsetLeft;
        let startY = e.clientY - el.offsetTop;

        const move = (e) => {
            if (!isDragging) return;
            el.style.left = (e.clientX - startX) + 'px';
            el.style.top = (e.clientY - startY) + 'px';
        };
        const up = () => { isDragging = false; window.removeEventListener('mousemove', move); };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
    });

    // --- GIRAR MANUAL ---
    const rotateHandle = el.querySelector('.rotate-handle');
    rotateHandle.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        isRotating = true;
        const rect = el.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        const move = (e) => {
            if (!isRotating) return;
            const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
            const degree = angle * (180 / Math.PI);
            el.dataset.rotation = degree;
            el.style.transform = `rotate(${degree}deg)`;
        };
        const up = () => { isRotating = false; window.removeEventListener('mousemove', move); };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
    });

    // --- REDIMENSIONAR ---
    el.querySelectorAll('.resizer').forEach(resizer => {
        resizer.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            isResizing = true;
            currentResizer = e.target;
            let startW = el.offsetWidth;
            let startH = el.offsetHeight;
            let startX = e.clientX;
            let startY = e.clientY;
            let startL = el.offsetLeft;
            let startT = el.offsetTop;

            const move = (e) => {
                if (!isResizing) return;
                const diffX = e.clientX - startX;
                const diffY = e.clientY - startY;

                if (currentResizer.classList.contains('se')) {
                    el.style.width = (startW + diffX) + 'px';
                    el.style.height = (startH + diffY) + 'px';
                } else if (currentResizer.classList.contains('sw')) {
                    el.style.width = (startW - diffX) + 'px';
                    el.style.left = (startL + diffX) + 'px';
                    el.style.height = (startH + diffY) + 'px';
                }
                // Outras direções (nw, ne) podem ser adicionadas seguindo a mesma lógica
            };
            const up = () => { isResizing = false; window.removeEventListener('mousemove', move); };
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', up);
        });
    });
}


function rotateSig(btn) {
    const el = btn.closest('.draggable-sig');
    let deg = parseInt(el.dataset.rotation || 0);
    deg = (deg + 90) % 360;
    el.dataset.rotation = deg;
    el.querySelector('img').style.transform = `rotate(${deg}deg)`;
}

function cloneSig(btn) {
    const el = btn.closest('.draggable-sig');
    const parent = el.parentElement;
    const imgUrl = el.querySelector('img').src;
    createDraggableSignature(imgUrl, parent);
}

// --- 4. Processamento Final e Download ---

saveBtn.addEventListener('click', async () => {
    const allSigs = document.querySelectorAll('.draggable-sig');
    if (allSigs.length === 0) return alert("Nenhuma assinatura encontrada.");

    saveBtn.textContent = "Processando...";
    saveBtn.disabled = true;

    try {
        const pdfDocLib = await PDFDocument.load(pdfBytes);
        const pages = pdfDocLib.getPages();

        for (const sig of allSigs) {
            const parentPage = sig.closest('.page-block');
            const pageIdx = parseInt(parentPage.dataset.pageNum) - 1;
            const pageLib = pages[pageIdx];
            
            const { width, height } = pageLib.getSize();
            const imgUrl = sig.querySelector('img').src;
            const rotation = parseInt(sig.dataset.rotation || 0);
            
            // Proporção entre o que está na tela e o PDF real
            const scaleRatio = width / parentPage.offsetWidth;

            const sigImg = await pdfDocLib.embedPng(imgUrl);
            
            const x = sig.offsetLeft * scaleRatio;
            // PDFLib usa coordenada Y de baixo para cima
            const y = height - (sig.offsetTop * scaleRatio) - (sig.offsetHeight * scaleRatio);

            pageLib.drawImage(sigImg, {
                x: x,
                y: y,
                width: sig.offsetWidth * scaleRatio,
                height: sig.offsetHeight * scaleRatio,
                rotate: degrees(-rotation)
            });
        }

        const pdfData = await pdfDocLib.save();
        const blob = new Blob([pdfData], { type: 'application/pdf' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "documento_assinado.pdf";
        link.click();
    } catch (err) {
        console.error(err);
        alert("Erro ao gerar PDF.");
    } finally {
        saveBtn.textContent = "Salvar e Baixar";
        saveBtn.disabled = false;
    }
});
