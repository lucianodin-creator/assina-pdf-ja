<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assinador PDF Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Previne o scroll durante a assinatura */
        #signature-pad {
            touch-action: none;
            cursor: crosshair;
        }

        /* Estilização da área de preview do PDF */
        #pdf-canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            cursor: cell;
        }

        .bg-navy { background-color: #1e293b; }
        .text-navy { color: #1e293b; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-navy p-6 text-white text-center shadow-lg">
        <h1 class="text-xl font-bold tracking-tight">Assinador de PDF Mobile</h1>
        <p class="text-sm opacity-80">Rápido, seguro e local</p>
    </header>

    <main class="max-w-md mx-auto px-4 mt-8 space-y-6">

        <section id="upload-section" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center">
            <div class="mb-4">
                <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold uppercase">Passo 1</span>
            </div>
            <h2 class="text-lg font-semibold mb-4">Selecione o documento</h2>
            <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-300 rounded-2xl cursor-pointer hover:bg-slate-50 transition">
                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                    <svg class="w-8 h-8 mb-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p class="text-sm text-slate-500" id="file-name">Toque para subir o PDF</p>
                </div>
                <input type="file" id="pdf-input" accept="application/pdf" class="hidden" />
            </label>
        </section>

        <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <div class="mb-4 text-center">
                <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold uppercase">Passo 2</span>
            </div>
            <h2 class="text-lg font-semibold mb-4 text-center">Desenhe sua assinatura</h2>
            <div class="border border-slate-200 rounded-xl bg-slate-50 overflow-hidden">
                <canvas id="signature-pad" class="w-full h-48"></canvas>
            </div>
            <div class="mt-3 flex justify-end">
                <button id="clear-btn" class="text-sm font-semibold text-red-500 px-4 py-2 hover:bg-red-50 rounded-lg transition">Limpar Assinatura</button>
            </div>
        </section>

        <section id="preview-section" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center">
                <div class="mb-4">
                    <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold uppercase">Passo 3</span>
                </div>
                <h2 class="text-lg font-semibold mb-2">Toque onde deseja assinar</h2>
                <p class="text-xs text-slate-500 mb-4">Clique no documento abaixo para posicionar a assinatura</p>
                
                <div class="flex justify-center overflow-auto rounded-lg">
                    <canvas id="pdf-canvas"></canvas>
                </div>

                <button id="download-btn" class="w-full mt-6 bg-navy text-white font-bold py-4 rounded-2xl shadow-lg hover:opacity-90 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    Baixar PDF Assinado
                </button>
            </div>
        </section>

    </main>

<script>
    // Configuração do Worker do PDF.js (Obrigatório para renderizar o PDF)
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cloudflare.com';

    const { PDFDocument } = PDFLib;
    let pdfDoc = null;
    let pdfBytes = null;
    let signaturePos = null;
    let pdfRenderedPage = null; // Armazena a página renderizada para cálculos

    // 1. Configuração do Canvas de Assinatura
    const canvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(canvas, {
        backgroundColor: 'rgba(255, 255, 255, 0)'
    });

    function resizeSignatureCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePad.clear();
    }
    window.addEventListener("resize", resizeSignatureCanvas);
    resizeSignatureCanvas();

    document.getElementById('clear-btn').addEventListener('click', () => signaturePad.clear());

    // 2. Lógica de Upload e RENDERIZAÇÃO REAL do PDF
    document.getElementById('pdf-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('file-name').textContent = file.name;
        pdfBytes = await file.arrayBuffer();

        // --- INÍCIO DA RENDERIZAÇÃO REAL ---
        const loadingTask = pdfjsLib.getDocument({ data: pdfBytes });
        const pdf = await loadingTask.promise;
        pdfRenderedPage = await pdf.getPage(1); // Pegamos a primeira página

        const previewCanvas = document.getElementById('pdf-canvas');
        const context = previewCanvas.getContext('2d');

        // Ajusta a escala para caber na largura do dispositivo (mobile-first)
        const containerWidth = document.getElementById('preview-section').offsetWidth - 40;
        const viewport = pdfRenderedPage.getViewport({ scale: containerWidth / pdfRenderedPage.getViewport({scale:1}).width });

        previewCanvas.width = viewport.width;
        previewCanvas.height = viewport.height;

        // Desenha o conteúdo do PDF no Canvas
        await pdfRenderedPage.render({
            canvasContext: context,
            viewport: viewport
        }).promise;
        // --- FIM DA RENDERIZAÇÃO REAL ---

        document.getElementById('preview-section').classList.remove('hidden');
        previewCanvas.scrollIntoView({ behavior: 'smooth' });
    });

    // 3. Captura o clique na prévia (com o PDF visível ao fundo)
    document.getElementById('pdf-canvas').addEventListener('click', function(e) {
        const rect = this.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        // Precisamos converter a escala do que vemos no canvas para os "pontos" reais do PDF
        const pdfViewport = pdfRenderedPage.getViewport({ scale: 1 });
        const scaleX = pdfViewport.width / rect.width;
        const scaleY = pdfViewport.height / rect.height;

        signaturePos = {
            x: x * scaleX,
            y: pdfViewport.height - (y * scaleY) // Inverte o eixo Y para o padrão PDFLib
        };

        // Feedback Visual: Desenha um retângulo semi-transparente sobre o PDF
        const ctx = this.getContext('2d');
        // Opcional: redesenhar a página para limpar marcações anteriores antes de desenhar a nova
        // Para simplicidade, apenas desenhamos o marcador:
        ctx.strokeStyle = "#1e293b";
        ctx.lineWidth = 2;
        ctx.strokeRect(x - 50, y - 25, 100, 50); // Desenha na escala da tela

        document.getElementById('download-btn').disabled = false;
        alert("Local da assinatura definido!");
    });

    // 4. Geração do PDF Final
    document.getElementById('download-btn').addEventListener('click', async () => {
        if (signaturePad.isEmpty()) {
            alert("Por favor, desenhe sua assinatura primeiro.");
            return;
        }

        try {
            const finalDoc = await PDFDocument.load(pdfBytes);
            const signatureImage = await finalDoc.embedPng(signaturePad.toDataURL());
            const firstPage = finalDoc.getPages()[0];

            // Define o tamanho da assinatura no documento final
            const sigWidth = 120;
            const sigHeight = 60;

            firstPage.drawImage(signatureImage, {
                x: signaturePos.x - (sigWidth / 2),
                y: signaturePos.y - (sigHeight / 2),
                width: sigWidth,
                height: sigHeight,
            });

            const pdfResultBytes = await finalDoc.save();
            const blob = new Blob([pdfResultBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "assinado.pdf";
            a.click();
            URL.revokeObjectURL(url);
        } catch (err) {
            console.error(err);
            alert("Erro ao processar. Tente novamente.");
        }
    });
</script>

</body>
</html>
